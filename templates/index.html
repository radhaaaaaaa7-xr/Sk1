<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUKHDEV BIND TOOL PRO</title>
    <style>
        /* 🌙 Dark Mode (Default) Variables */
        :root { 
            --bg: #0f0f1a; 
            --box: #1a1a2e; 
            --primary: #e94560; 
            --primary-hover: #d1304b;
            --text: #ffffff; 
            --output-border: #0f3460;
            --input-bg: #16213e;
            --input-text: #ffffff;
            --console-bg: #050505;
            --console-text: #00ffcc;
            --glow: 0 0 15px rgba(233, 69, 96, 0.4);
        }

        /* 🌞 Light / Day Mode Variables */
        body.light-mode {
            --bg: #f4f7f6; 
            --box: #ffffff; 
            --primary: #d1304b; 
            --primary-hover: #b0283d;
            --text: #333333; 
            --output-border: #cccccc;
            --input-bg: #f9f9f9;
            --input-text: #000000;
            --console-bg: #1e1e1e;
            --console-text: #4caf50;
            --glow: 0 4px 15px rgba(0,0,0,0.1);
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; margin: 0; transition: all 0.4s ease; }
        
        /* 🔘 Theme Toggle Button */
        .theme-btn {
            position: absolute; top: 15px; right: 15px; background: var(--box); color: var(--text);
            border: 2px solid var(--primary); padding: 8px 15px; border-radius: 20px;
            cursor: pointer; font-weight: bold; font-size: 13px; transition: all 0.3s ease;
            box-shadow: var(--glow);
        }
        .theme-btn:hover { background: var(--primary); color: white; transform: translateY(-2px); }

        .container { max-width: 500px; margin: 50px auto 20px; background: var(--box); padding: 25px; border-radius: 12px; box-shadow: var(--glow); transition: all 0.4s ease; }
        h2 { text-align: center; color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--output-border); padding-bottom: 10px; text-shadow: 0 0 10px rgba(233, 69, 96, 0.3); }
        
        .main-input { width: 95%; padding: 12px; border-radius: 6px; border: 2px solid var(--primary); background: var(--input-bg); color: var(--input-text); font-weight: bold; margin-bottom: 15px; transition: all 0.3s; }
        .main-input:focus { outline: none; box-shadow: 0 0 10px var(--primary); }

        .tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1 1 25%; padding: 10px; background: var(--output-border); color: var(--text); border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; box-shadow: 0 0 10px var(--primary); transform: translateY(-2px); }
        
        .section { display: none; background: rgba(0,0,0,0.1); padding: 15px; border-radius: 8px; border: 1px dashed var(--output-border); animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        input { width: 95%; padding: 12px; margin: 8px 0; border-radius: 4px; border: 1px solid var(--output-border); background: var(--input-bg); color: var(--input-text); outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        
        button.action-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 8px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        button.action-btn:hover { background: var(--primary-hover); transform: scale(0.98); }
        button.half-btn { width: 48%; display: inline-block; padding: 10px; font-size: 13px; }
        
        /* 🖥️ Premium Console Box */
        .console-container {
            margin-top: 25px; background: var(--console-bg); border-radius: 8px;
            border: 2px solid var(--output-border); box-shadow: inset 0 0 15px rgba(0,0,0,0.8), var(--glow);
            overflow: hidden;
        }
        .console-header {
            background: var(--output-border); padding: 10px 15px; display: flex;
            justify-content: space-between; align-items: center; color: var(--text);
            font-weight: bold; font-size: 14px; border-bottom: 2px solid var(--primary);
        }
        .clear-btn { background: #ff4757; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.3s; }
        .clear-btn:hover { background: #ff6b81; transform: scale(1.05); }
        .console {
            color: var(--console-text); padding: 15px; font-family: 'Courier New', Courier, monospace;
            font-size: 13px; white-space: pre-wrap; height: 220px; overflow-y: auto; margin: 0;
            line-height: 1.5; text-shadow: 0 0 5px rgba(0, 255, 204, 0.4);
        }

        /* 🔔 Stylish Toast Notifications */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 15px 20px; border-radius: 8px; color: white; font-weight: bold; font-size: 14px; display: flex; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.4); animation: slideIn 0.4s ease-out forwards; min-width: 250px; }
        .toast.success { background: #2ed573; border-left: 6px solid #27ae60; }
        .toast.error { background: #ff4757; border-left: 6px solid #c0392b; }
        .toast.info { background: #1e90ff; border-left: 6px solid #0984e3; }
        
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
    </style>
</head>
<body>

<!-- 🔔 Toast Container -->
<div id="toast-container"></div>

<button class="theme-btn" id="themeToggleBtn" onclick="toggleTheme()">🌞 Light Mode</button>

<div class="container">
    <h2>🌟 SUKHDEV BIND PRO 🌟</h2>
    
    <label style="font-weight: bold; font-size: 14px;">🔑 Main Access / JWT Token:</label>
    <input type="text" id="global_token" class="main-input" placeholder="Paste Your Token Here...">

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab(event, 'tab-info')">Info</button>
        <button class="tab-btn" onclick="showTab(event, 'tab-bind')">Bind</button>
        <button class="tab-btn" onclick="showTab(event, 'tab-change')">Change</button>
        <button class="tab-btn" onclick="showTab(event, 'tab-unbind')">Unbind</button>
        <button class="tab-btn" onclick="showTab(event, 'tab-history')">Tools</button>
    </div>

    <!-- 1. INFO TAB -->
    <div id="tab-info" class="section active">
        <button class="action-btn" style="background:#00bcd4;" onclick="callAPI('/api/player_info', {}, 'Player Profile Fetched!')">👤 1. Get Player Profile</button>
        <button class="action-btn" style="background:#8e44ad;" onclick="callAPI('/api/bind_info', {}, 'Bind Info Checked!')">ℹ️ 2. Check Bind Info</button>
        <button class="action-btn" onclick="callAPI('/api/bound_platforms', {}, 'Linked Accounts Fetched!')">🔗 3. Check Linked Accounts</button>
        <button class="action-btn" onclick="callAPI('/api/cancel_bind', {}, 'Bind Request Cancelled Successfully!')" style="background:#f39c12;">🚫 4. Cancel Any Bind Request</button>
    </div>

    <!-- 2. BIND TAB (NEW BIND) -->
    <div id="tab-bind" class="section">
        <input type="email" id="bind_email" placeholder="New Email Dale">
        <button class="action-btn half-btn" style="background:#3498db;" onclick="callAPI('/api/send_otp', {email: getVal('bind_email')}, 'OTP Sent to New Email!')">📧 Send OTP</button>
        <input type="text" id="bind_otp" placeholder="Enter OTP (6-Digits)">
        <input type="text" id="bind_sec" placeholder="Create 6-Digit Security Code">
        <button class="action-btn" style="background: #2ecc71;" onclick="smartBind()">🔒 Verify & Bind</button>
    </div>

    <!-- 3. CHANGE EMAIL TAB -->
    <div id="tab-change" class="section">
        <label style="font-size: 13px; color: var(--primary); font-weight: bold;">STEP 1: Old Identity Verification</label>
        <input type="email" id="c_old_email" placeholder="Old (Bound) Email">
        <button class="action-btn half-btn" onclick="callAPI('/api/send_otp', {email: getVal('c_old_email')}, 'OTP Sent to Old Email!')">Send OTP (Old)</button>
        <input type="text" id="c_old_otp" placeholder="Old OTP (Ya niche Security Code dale)">
        <input type="text" id="c_sec_code" placeholder="Ya Security Code dale">
        
        <hr style="border-color: var(--output-border); margin: 15px 0;">
        <label style="font-size: 13px; color: #2ecc71; font-weight: bold;">STEP 2: New Email Setup</label>
        <input type="email" id="c_new_email" placeholder="New Email">
        <button class="action-btn half-btn" onclick="callAPI('/api/send_otp', {email: getVal('c_new_email')}, 'OTP Sent to New Email!')">Send OTP (New)</button>
        <input type="text" id="c_new_otp" placeholder="New OTP">
        <button class="action-btn" style="background: #2980b9; margin-top:15px;" onclick="smartChange()">🔄 Verify & Change Email</button>
    </div>

    <!-- 4. UNBIND TAB -->
    <div id="tab-unbind" class="section">
        <label style="font-size: 12px; font-weight: bold; color:#e74c3c;">Enter OTP or Security Code (Any One):</label>
        <input type="email" id="unbind_email" placeholder="Bound Email">
        <button class="action-btn" style="background:#e67e22;" onclick="callAPI('/api/send_otp', {email: getVal('unbind_email')}, 'OTP Sent for Unbind!')">📧 Send OTP (Old Email)</button>
        <input type="text" id="unbind_otp" placeholder="OTP Code">
        <input type="text" id="unbind_sec" placeholder="Security Code">
        <button class="action-btn" style="background: #e74c3c;" onclick="smartUnbind()">🗑️ Verify & Unbind</button>
    </div>

    <!-- 5. HISTORY & TOOLS TAB -->
    <div id="tab-history" class="section">
        <button class="action-btn" style="background:#16a085;" onclick="callAPI('/api/login_history', {}, 'Login History Fetched!')">🕒 Get Login History</button>
        <hr style="border-color: var(--output-border); margin: 15px 0;">
        <input type="text" id="eat_url" placeholder="EAT URL / Auth Link Paste Kare">
        <button class="action-btn" style="background: #8e44ad;" onclick="extractEatToken()">🪄 Extract & Auto-Fill Token</button>
    </div>

    <!-- TERMINAL CONSOLE -->
    <div class="console-container">
        <div class="console-header">
            <span>🖥️ Live Result / Terminal</span>
            <button class="clear-btn" onclick="clearConsole()">🗑️ Clear</button>
        </div>
        <div class="console" id="console">Waiting for command...</div>
    </div>
</div>

<script>
    // --- 🔔 Stylish Notification System ---
    function showNotification(message, type = 'info') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        
        let icon = type === 'success' ? '✅ ' : type === 'error' ? '❌ ' : 'ℹ️ ';
        toast.innerText = icon + message;
        
        container.appendChild(toast);
        
        // Auto remove after 3.5 seconds
        setTimeout(() => {
            toast.style.animation = 'slideOut 0.4s ease forwards';
            setTimeout(() => toast.remove(), 400);
        }, 3500);
    }

    // --- 🌙 Dark/Light Mode Toggle ---
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById("themeToggleBtn");
        body.classList.toggle("light-mode");
        
        if(body.classList.contains("light-mode")) {
            btn.innerHTML = "🌙 Night Mode";
            showNotification("Light Mode Activated!", "info");
        } else {
            btn.innerHTML = "🌞 Light Mode";
            showNotification("Dark Mode Activated!", "info");
        }
    }

    // --- 🖥️ Terminal Logic ---
    function clearConsole() {
        document.getElementById("console").innerText = "Waiting for command...";
        showNotification("Terminal Cleared!", "success");
    }

    function logOutput(msg) { 
        const consoleBox = document.getElementById("console");
        const timestamp = new Date().toLocaleTimeString();
        consoleBox.innerText = `[${timestamp}]\n${msg}\n\n---------------------------\n` + consoleBox.innerText; 
    }

    // --- 🗂️ Navigation Tabs Logic ---
    function showTab(event, tabId) {
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }
    
    function getVal(id) { return document.getElementById(id).value.trim(); }

    // --- 🔌 Main API Fetch Logic ---
    async function callAPI(endpoint, extraData = {}, successMessage = null) {
        const token = getVal('global_token');
        if(!token && endpoint !== '/api/eat_to_token') { 
            showNotification("Token Missing! Sabse pahle Token dale.", "error");
            return null; 
        }
        
        logOutput(`[REQUEST] Calling ${endpoint}...`);
        
        try {
            const response = await fetch(endpoint, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ token: token, ...extraData }) 
            });
            const data = await response.json();
            
            // Format JSON Beautifully in Console
            logOutput(`[RESPONSE]\n${JSON.stringify(data, null, 2)}`);

            if(data.result === 0) {
                if(successMessage) showNotification(successMessage, "success");
                return data;
            } else {
                let err = data.error || "Unknown Error From Server";
                showNotification(`FAILED: ${err}`, "error");
                return null;
            }
        } catch (error) { 
            showNotification(`ERROR: Backend Start Nahi Hai ya Server Down Hai!`, "error");
            logOutput(`[CRITICAL ERROR]\n${error.message}`);
            return null; 
        }
    }

    // ----------------------------------------------------
    // ADVANCED LOGIC FUNCTIONS (BIND, CHANGE, UNBIND, EAT)
    // ----------------------------------------------------

    async function smartBind() {
        const e = getVal('bind_email'), o = getVal('bind_otp'), s = getVal('bind_sec');
        if(!e || !o || !s) return showNotification("Email, OTP aur Security Code tino dale!", "error");
        
        const v = await callAPI('/api/verify_otp', {email: e, otp: o});
        if(v && v.verifier_token) {
            const b = await callAPI('/api/bind_email', {email: e, v_token: v.verifier_token, sec_code: s});
            if(b && b.result === 0) showNotification("BIND REQUEST CREATED SUCCESSFULLY!", "success");
        } else {
            showNotification("OTP Verification Failed!", "error");
        }
    }

    async function smartChange() {
        const oldE = getVal('c_old_email'), oldO = getVal('c_old_otp'), secC = getVal('c_sec_code');
        const newE = getVal('c_new_email'), newO = getVal('c_new_otp');

        if(!oldE || !newE || !newO) return showNotification("Old Email, New Email aur New OTP jaruri hai!", "error");
        if(!oldO && !secC) return showNotification("Old OTP ya Security Code dale!", "error");

        const id_res = await callAPI('/api/verify_identity', { email: oldE, otp: oldO, sec_code: secC });
        if(!id_res || !id_res.identity_token) return showNotification("Identity Verification Failed! (Wrong Password/OTP)", "error");
        
        const v_res = await callAPI('/api/verify_otp', { email: newE, otp: newO });
        if(!v_res || !v_res.verifier_token) return showNotification("New OTP Verification Failed!", "error");

        const c_res = await callAPI('/api/change_email', { id_token: id_res.identity_token, new_email: newE, v_token: v_res.verifier_token });
        if(c_res && c_res.result === 0) showNotification("EMAIL REBIND SUCCESSFULLY CREATED!", "success");
    }

    async function smartUnbind() {
        const e = getVal('unbind_email'), o = getVal('unbind_otp'), s = getVal('unbind_sec');
        if(!e) return showNotification("Bound Email dale!", "error");
        if(!o && !s) return showNotification("OTP ya Security Code dale!", "error");
        
        const id = await callAPI('/api/verify_identity', {email: e, otp: o, sec_code: s});
        if(id && id.identity_token) {
            const u = await callAPI('/api/unbind_email', {id_token: id.identity_token});
            if(u && u.result === 0) showNotification("UNBIND REQUEST CREATED SUCCESSFULLY!", "success");
        } else {
            showNotification("Identity Verification Failed! (Wrong Password/OTP)", "error");
        }
    }

    async function extractEatToken() {
        const urlVal = getVal('eat_url');
        if(!urlVal) return showNotification("EAT URL link paste kare!", "error");
        
        const res = await callAPI('/api/eat_to_token', { eat: urlVal });
        if(res && res.result === 0 && res.access_token) {
            document.getElementById('global_token').value = res.access_token;
            showNotification("Token Auto-Filled in Main Box!", "success");
        } else {
            showNotification("Failed to extract token!", "error");
        }
    }
</script>
</body>
  </html>
