<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFSAR BIND TOOL</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151c2c;
            --accent-blue: #00d2ff;
            --accent-gold: #ffb703;
            --btn-purple: #9d4edd;
            --btn-green: #2a9d8f;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 15px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--accent-blue);
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 10px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .header h1 i {
            color: var(--accent-gold);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-title {
            color: var(--accent-blue);
            font-size: 16px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #2e3a52;
            background-color: #0b0f19;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active {
            opacity: 0.8;
        }

        .btn-purple { background-color: var(--btn-purple); }
        .btn-green { background-color: var(--btn-green); }
        .btn-blue { background-color: #0284c7; }
        .btn-danger { background-color: #ef4444; }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            font-size: 14px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label { color: var(--text-muted); }
        .info-value { color: white; font-weight: 500; }

        .logger-box {
            background-color: #000;
            font-family: monospace;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            color: #00ff00;
            height: 60px;
            overflow-y: auto;
            border: 1px solid #222;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-bolt"></i> AFSAR BIND TOOL <i class="fas fa-bolt"></i></h1>
        <div class="subtitle">100% Safe & Direct Garena Panel</div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-key"></i> Session Manager</div>
        <div class="form-group">
            <label>Access Token</label>
            <input type="text" placeholder="Paste your Garena Access Token here...">
        </div>
        <div class="btn-group">
            <button class="btn-purple">Load Account Info</button>
            <button class="btn-danger">Clear Session</button>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-user"></i> Player Profile</div>
        <div class="info-row">
            <span class="info-label">UID:</span>
            <span class="info-value" id="prof-uid">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Nickname:</span>
            <span class="info-value" id="prof-nick">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Region:</span>
            <span class="info-value" id="prof-region">-</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-envelope"></i> Bind Details</div>
        <div class="info-row">
            <span class="info-label">Current Email:</span>
            <span class="info-value" id="bind-current">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Pending Email:</span>
            <span class="info-value" id="bind-pending">-</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-shield-alt"></i> Security Code Bypass (Change Gmail)</div>
        
        <div class="form-group">
            <label>6-Digit Security Code</label>
            <input type="text" placeholder="Enter Security Code">
        </div>
        <button class="btn-blue" style="width: 100%; margin-bottom: 15px;">Verify & Change Email</button>

        <div class="form-group">
            <label>New Email Address</label>
            <input type="email" placeholder="Enter New Email">
        </div>
        <button class="btn-green" style="width: 100%; margin-bottom: 15px;">Send OTP</button>

        <div class="form-group">
            <label>Enter OTP</label>
            <input type="text" placeholder="Enter OTP received on new email">
        </div>
        <button class="btn-purple" style="width: 100%;">Confirm Rebind</button>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-terminal"></i> System Status</div>
        <div class="logger-box">
            [System] Waiting for Access Token...
        </div>
    </div>

</body>
</html>
