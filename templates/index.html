<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Afsar Bind Tool Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f0f1a; color: #fff; }
        .card { background: #1a1a2e; border: 1px solid #3f3f5f; border-radius: 12px; }
        .btn-gradient { background: linear-gradient(45deg, #ff007f, #7f00ff); color: white; }
        .text-cyan { color: #00ffff; }
        .nav-link { color: #00ffff; }
        .nav-link.active { background: #16213e; border-color: #00ffff; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="text-center mb-4">
        <h1 class="text-cyan fw-bold">⚡ AFSAR BIND TOOL PRO ⚡</h1>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4 mb-4">
                <h4 class="text-cyan">🔑 Access Token</h4>
                <input type="text" id="tokenInput" class="form-control bg-dark text-white mb-3" placeholder="Paste your token">
                <button onclick="fetchInfo()" class="btn btn-gradient w-100">Load Account Info</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="d-none">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <!-- Profile -->
                <div class="card p-4 mb-4">
                    <h5 class="text-cyan">👤 Profile</h5>
                    <p>UID: <span id="pUid"></span></p>
                    <p>Nickname: <span id="pName"></span></p>
                    <p>Current Email: <span id="bEmail" class="text-success"></span></p>
                </div>

                <ul class="nav nav-tabs mb-4">
                    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#bindTab">Bind New Email</a></li>
                    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#changeTab">Change Email</a></li>
                    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#unbindTab">Unbind Email</a></li>
                </ul>

                <div class="tab-content">
                    <!-- Bind New -->
                    <div class="tab-pane fade show active" id="bindTab">
                        <div class="card p-4">
                            <h5 class="text-cyan">➕ Bind New Email (OTP + Security Code)</h5>
                            <input type="email" id="bindEmail" class="form-control bg-dark mb-2" placeholder="New Email">
                            <input type="password" id="bindSecCode" class="form-control bg-dark mb-2" placeholder="6-Digit Security Code (optional)">
                            <button onclick="sendBindOtp()" class="btn btn-success w-100 mb-2">Send OTP</button>
                            <input type="text" id="bindOtp" class="form-control bg-dark mb-2" placeholder="Enter OTP">
                            <button onclick="doBind()" class="btn btn-gradient w-100">Bind Email</button>
                        </div>
                    </div>

                    <!-- Change Email -->
                    <div class="tab-pane fade" id="changeTab">
                        <div class="card p-4">
                            <h5 class="text-cyan">🔄 Change Email</h5>
                            <button onclick="startSecurityChange()" class="btn btn-danger w-100 mb-3">Use Security Code</button>
                            <button onclick="startOtpChange()" class="btn btn-warning w-100">Use Old Email OTP</button>
                            <!-- Next steps will show here via JS -->
                        </div>
                    </div>

                    <!-- Unbind -->
                    <div class="tab-pane fade" id="unbindTab">
                        <div class="card p-4">
                            <h5 class="text-cyan">🗑️ Unbind Current Email</h5>
                            <button onclick="startUnbind()" class="btn btn-danger w-100">Start Unbind</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let token = '', oldEmail = '', idToken = '';

    async function fetchInfo() {
        token = document.getElementById('tokenInput').value.trim();
        const res = await fetch('/api/get_info', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({token})});
        const r = await res.json();
        if (r.status === 'success') {
            document.getElementById('pUid').innerText = r.data.profile.uid;
            document.getElementById('pName').innerText = r.data.profile.nickname;
            document.getElementById('bEmail').innerText = r.data.bind.email;
            oldEmail = r.data.bind.email;
            document.getElementById('dashboard').classList.remove('d-none');
        } else alert('Invalid Token');
    }

    // Bind New Email
    async function sendBindOtp() {
        const email = document.getElementById('bindEmail').value;
        const res = await fetch('/api/send_otp', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, email})});
        const r = await res.json();
        alert(r.result === 0 ? 'OTP Sent!' : 'Failed');
    }

    async function doBind() {
        const email = document.getElementById('bindEmail').value;
        const otp = document.getElementById('bindOtp').value;
        const sec = document.getElementById('bindSecCode').value;
        const res = await fetch('/api/bind_new', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, email, otp, sec_code: sec})});
        const r = await res.json();
        alert(r.result === 0 ? '✅ Email Bound Successfully!' : '❌ Failed');
    }

    // Change & Unbind (you can expand similarly)
    async function startSecurityChange() { alert("Security Code flow ready in backend. Use main Security tab if needed."); }
    async function startOtpChange() { alert("OTP flow for change ready."); }
    async function startUnbind() { alert("Unbind ready in backend."); }
</script>
</body>
</html>
