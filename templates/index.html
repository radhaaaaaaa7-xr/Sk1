<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFSAR BIND TOOL</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #151c2c;
            --accent-blue: #00d2ff;
            --accent-gold: #ffb703;
            --btn-purple: #9d4edd;
            --btn-green: #2a9d8f;
            --btn-blue: #0284c7;
            --btn-danger: #ef4444;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 15px;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            color: var(--accent-blue);
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 10px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .header h1 i {
            color: var(--accent-gold);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-title {
            color: var(--accent-blue);
            font-size: 16px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        label {
            display: block;
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #2e3a52;
            background-color: #0b0f19;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        /* बटन लेआउट - हर बटन अलग और साफ़ दिखेगा */
        .action-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: background 0.2s, transform 0.1s;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .btn-purple { background-color: var(--btn-purple); }
        .btn-green { background-color: var(--btn-green); }
        .btn-blue { background-color: var(--btn-blue); }
        .btn-danger { background-color: var(--btn-danger); }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 14px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label { color: var(--text-muted); }
        .info-value { color: white; font-weight: 500; }

        .logger-box {
            background-color: #000;
            font-family: monospace;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #00ff00;
            height: 100px;
            overflow-y: auto;
            border: 1px solid #222;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1><i class="fas fa-bolt"></i> AFSAR BIND TOOL <i class="fas fa-bolt"></i></h1>
        <div class="subtitle">100% Safe & Direct Garena Panel</div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-key"></i> Session Manager</div>
        <div class="form-group">
            <label>Access Token</label>
            <input type="text" id="token-input" placeholder="Paste your Garena Access Token here...">
        </div>
        
        <button class="action-btn btn-purple" id="btn-load">
            <i class="fas fa-sync-alt"></i> Load Account Info
        </button>
        <button class="action-btn btn-danger" id="btn-clear">
            <i class="fas fa-trash-alt"></i> Clear Session
        </button>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-user"></i> Player Profile</div>
        <div class="info-row">
            <span class="info-label">UID:</span>
            <span class="info-value" id="prof-uid">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Nickname:</span>
            <span class="info-value" id="prof-nick">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Region:</span>
            <span class="info-value" id="prof-region">-</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-envelope"></i> Bind Details</div>
        <div class="info-row">
            <span class="info-label">Current Email:</span>
            <span class="info-value" id="bind-current">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Pending Email:</span>
            <span class="info-value" id="bind-pending">-</span>
        </div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-shield-alt"></i> Security Code Bypass (Change Gmail)</div>
        
        <div class="form-group">
            <label>6-Digit Security Code</label>
            <input type="text" id="sec-code-input" placeholder="Enter Security Code">
        </div>
        <button class="action-btn btn-blue" id="btn-verify-code">
            <i class="fas fa-unlock-alt"></i> Verify & Change Email
        </button>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 15px 0;">

        <div class="form-group">
            <label>New Email Address</label>
            <input type="email" id="new-email-input" placeholder="Enter New Email">
        </div>
        <button class="action-btn btn-green" id="btn-send-otp">
            <i class="fas fa-paper-plane"></i> Send OTP
        </button>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 15px 0;">

        <div class="form-group">
            <label>Enter OTP</label>
            <input type="text" id="otp-input" placeholder="Enter OTP received on new email">
        </div>
        <button class="action-btn btn-purple" id="btn-confirm-rebind">
            <i class="fas fa-check-circle"></i> Confirm Rebind
        </button>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-terminal"></i> System Status</div>
        <div class="logger-box" id="logger">
            [System] Ready. Please enter Access Token to start...
        </div>
    </div>

    <script>
        const logger = document.getElementById('logger');

        function logMessage(message) {
            const time = new Date().toLocaleTimeString();
            logger.innerHTML += `<br>[${time}] ${message}`;
            logger.scrollTop = logger.scrollHeight;
        }

        // 1. Load Account Info Button
        document.getElementById('btn-load').addEventListener('click', () => {
            const token = document.getElementById('token-input').value.trim();
            if(!token) {
                logMessage('<span style="color: #ef4444;">[Error] Access Token खाली है!</span>');
                alert('कृपया पहले Access Token पेस्ट करें!');
                return;
            }
            logMessage('Connecting to Garena Servers...');
            logMessage('Fetching Profile and Bind Details...');
            
            // यहाँ डेमो डेटा सेट कर रहे हैं, बैकएंड जुड़ने पर यह लाइव हो जाएगा
            document.getElementById('prof-uid').innerText = '123456789';
            document.getElementById('prof-nick').innerText = 'Afsar_Player';
            document.getElementById('prof-region').innerText = 'IND';
            document.getElementById('bind-current').innerText = 'old_email@gmail.com';
            document.getElementById('bind-pending').innerText = 'None';
            
            logMessage('<span style="color: #2a9d8f;">[Success] Data Loaded Successfully!</span>');
        });

        // 2. Clear Session Button
        document.getElementById('btn-clear').addEventListener('click', () => {
            document.getElementById('token-input').value = '';
            document.getElementById('sec-code-input').value = '';
            document.getElementById('new-email-input').value = '';
            document.getElementById('otp-input').value = '';
            
            document.getElementById('prof-uid').innerText = '-';
            document.getElementById('prof-nick').innerText = '-';
            document.getElementById('prof-region').innerText = '-';
            document.getElementById('bind-current').innerText = '-';
            document.getElementById('bind-pending').innerText = '-';
            
            logMessage('<span style="color: #ffb703;">[System] Session Cleared. All fields reset.</span>');
        });

        // 3. Verify Code Button
        document.getElementById('btn-verify-code').addEventListener('click', () => {
            const code = document.getElementById('sec-code-input').value.trim();
            if(!code) {
                logMessage('<span style="color: #ef4444;">[Error] कृपया 6-Digit Security Code दर्ज करें!</span>');
                return;
            }
            logMessage(`Verifying Security Code: ${code}...`);
            logMessage('<span style="color: #2a9d8f;">[Success] Security Code Bypassed. You can now input new email.</span>');
        });

        // 4. Send OTP Button
        document.getElementById('btn-send-otp').addEventListener('click', () => {
            const email = document.getElementById('new-email-input').value.trim();
            if(!email) {
                logMessage('<span style="color: #ef4444;">[Error] ईमेल आईडी खाली है!</span>');
                return;
            }
            logMessage(`Sending OTP request to: ${email}...`);
            logMessage('<span style="color: #2a9d8f;">[Success] OTP Sent! Please check your inbox.</span>');
        });

        // 5. Confirm Rebind Button
        document.getElementById('btn-confirm-rebind').addEventListener('click', () => {
            const otp = document.getElementById('otp-input').value.trim();
            if(!otp) {
                logMessage('<span style="color: #ef4444;">[Error] कृपया पहले OTP दर्ज करें!</span>');
                return;
            }
            logMessage('Validating OTP with Garena API...');
            logMessage('<span style="color: #2a9d8f;">[Success] Account Rebind Completed Successfully!</span>');
            
            // अपडेटेड ईमेल दिखाएँ
            const newEmail = document.getElementById('new-email-input').value.trim();
            if(newEmail) document.getElementById('bind-current').innerText = newEmail;
        });
    </script>

</body>
</html>
