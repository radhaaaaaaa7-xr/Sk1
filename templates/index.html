<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUKHDEV BIND TOOL PRO</title>
    <style>
        /* Dark Mode (Default) Variables */
        :root { 
            --bg: #1a1a2e; 
            --box: #16213e; 
            --primary: #e94560; 
            --text: #ffffff; 
            --output-border: #0f3460;
            --input-bg: #ffffff;
            --input-text: #000000;
            --console-bg: #000000;
            --console-text: #00ff00;
        }

        /* Light / Day Mode Variables */
        body.light-mode {
            --bg: #f0f2f5; 
            --box: #ffffff; 
            --primary: #d1304b; 
            --text: #333333; 
            --output-border: #cccccc;
            --input-bg: #f9f9f9;
            --input-text: #000000;
            --console-bg: #1e1e1e;
            --console-text: #4caf50;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); color: var(--text); padding: 15px; margin: 0; transition: all 0.3s ease; }
        
        /* Theme Toggle Button */
        .theme-btn {
            position: absolute; top: 15px; right: 15px; background: var(--box); color: var(--text);
            border: 2px solid var(--primary); padding: 8px 15px; border-radius: 20px;
            cursor: pointer; font-weight: bold; font-size: 13px; transition: all 0.3s ease;
        }
        .theme-btn:hover { background: var(--primary); color: white; }

        .container { max-width: 500px; margin: 50px auto 20px; background: var(--box); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: all 0.3s ease; }
        h2 { text-align: center; color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--output-border); padding-bottom: 10px; }
        
        .main-input { width: 95%; padding: 12px; border-radius: 6px; border: 2px solid var(--primary); background: var(--input-bg); color: var(--input-text); font-weight: bold; margin-bottom: 15px; }
        
        .tabs { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
        .tab-btn { flex: 1 1 30%; padding: 10px; background: var(--output-border); color: var(--text); border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 500; transition: background 0.3s; }
        .tab-btn.active { background: var(--primary); font-weight: bold; color: white; }
        
        .section { display: none; background: rgba(0,0,0,0.05); padding: 15px; border-radius: 8px; border: 1px dashed var(--output-border); }
        .section.active { display: block; }
        
        input { width: 95%; padding: 12px; margin: 8px 0; border-radius: 4px; border: 1px solid var(--output-border); background: var(--input-bg); color: var(--input-text); }
        
        button.action-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 8px; transition: 0.2s; }
        button.action-btn:hover { opacity: 0.9; transform: scale(0.98); }
        button.half-btn { width: 48%; display: inline-block; padding: 10px; font-size: 13px; }
        
        /* New Stylish Console Box */
        .console-container {
            margin-top: 25px; background: var(--console-bg); border-radius: 8px;
            border: 2px solid var(--output-border); box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .console-header {
            background: var(--output-border); padding: 10px 15px; display: flex;
            justify-content: space-between; align-items: center; color: var(--text);
            font-weight: bold; font-size: 14px; border-bottom: 2px solid var(--primary);
        }
        .clear-btn {
            background: #ff4757; color: white; border: none; padding: 5px 12px;
            border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold;
        }
        .clear-btn:hover { background: #ff6b81; }
        .console {
            color: var(--console-text); padding: 15px; font-family: monospace;
            font-size: 13px; white-space: pre-wrap; height: 220px; overflow-y: auto; margin: 0;
        }
    </style>
</head>
<body>

<button class="theme-btn" id="themeToggleBtn" onclick="toggleTheme()">🌞 Light Mode</button>

<div class="container">
    <h2>🌟 SUKHDEV WEB TOOL PRO 🌟</h2>
    
    <label style="font-weight: bold; font-size: 14px;">Main Access Token / JWT Token:</label>
    <input type="text" id="global_token" class="main-input" placeholder="Yaha Token Paste Kare...">

    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('tab-info')">Info</button>
        <button class="tab-btn" onclick="showTab('tab-bind')">Bind</button>
        <button class="tab-btn" onclick="showTab('tab-change')">Change</button>
        <button class="tab-btn" onclick="showTab('tab-unbind')">Unbind</button>
        <button class="tab-btn" onclick="showTab('tab-history')">History</button>
    </div>

    <div id="tab-info" class="section active">
        <button class="action-btn" style="background:#00bcd4;" onclick="callAPI('/api/player_info', {}, 'Player Info Fetch Successfully!')">👤 1. Get Player Profile</button>
        <button class="action-btn" onclick="callAPI('/api/bind_info', {}, 'Bind Info Fetch Successfully!')">ℹ️ 2. Check Bind Info</button>
        <button class="action-btn" onclick="callAPI('/api/bound_platforms', {}, 'Linked Accounts Fetch Successfully!')">🔗 3. Check Linked Accounts</button>
        <button class="action-btn" onclick="callAPI('/api/cancel_bind', {}, 'Bind Request Cancelled Successfully!')" style="background:#ff9800;">🚫 4. Cancel Any Bind Request</button>
    </div>

    <div id="tab-bind" class="section">
        <input type="email" id="bind_email" placeholder="New Email Dale">
        <button class="action-btn" onclick="callAPI('/api/send_otp', {email: getVal('bind_email')}, 'OTP Sent Successfully!')">📧 Send OTP</button>
        <input type="text" id="bind_otp" placeholder="Email par aaya OTP dale">
        <input type="text" id="bind_sec" placeholder="Naya 6-Digit Security Code banaye">
        <button class="action-btn" style="background: #4caf50;" onclick="smartBind()">🔒 Verify & Bind</button>
    </div>

    <div id="tab-change" class="section">
        <label style="font-size: 13px; color: var(--primary); font-weight: bold;">STEP 1: Purani Identity Verify Kare</label>
        <input type="email" id="c_old_email" placeholder="Purana (Bound) Email dale">
        <button class="action-btn half-btn" onclick="callAPI('/api/send_otp', {email: getVal('c_old_email')}, 'Old Email OTP Sent!')">Send OTP (Old)</button>
        <input type="text" id="c_old_otp" placeholder="Purana OTP">
        <input type="text" id="c_sec_code" placeholder="Ya Security Code dale">
        
        <hr style="border-color: var(--output-border); margin: 15px 0;">
        <label style="font-size: 13px; color: #4caf50; font-weight: bold;">STEP 2: Naya Email Jode</label>
        <input type="email" id="c_new_email" placeholder="Naya Email dale">
        <button class="action-btn half-btn" onclick="callAPI('/api/send_otp', {email: getVal('c_new_email')}, 'New Email OTP Sent!')">Send OTP (New)</button>
        <input type="text" id="c_new_otp" placeholder="Naya OTP">
        <button class="action-btn" style="background: #2196f3; margin-top:15px;" onclick="smartChange()">🔄 Verify & Change Email</button>
    </div>

    <div id="tab-unbind" class="section">
        <label style="font-size: 12px; font-weight: bold;">OTP ya Security Code me se koi ek dale:</label>
        <input type="email" id="unbind_email" placeholder="Juda hua (Bound) Email dale">
        <button class="action-btn" onclick="callAPI('/api/send_otp', {email: getVal('unbind_email')}, 'OTP Sent!')">📧 Send OTP (Old Email)</button>
        <input type="text" id="unbind_otp" placeholder="OTP (Agar OTP se hatana hai)">
        <input type="text" id="unbind_sec" placeholder="Security Code (Agar direct hatana hai)">
        <button class="action-btn" style="background: #e91e63;" onclick="smartUnbind()">🗑️ Verify & Unbind</button>
    </div>

    <div id="tab-history" class="section">
        <button class="action-btn" onclick="callAPI('/api/login_history', {}, 'History Fetched Successfully!')">🕒 Get Login History</button>
        <hr style="border-color: var(--output-border); margin: 15px 0;">
        <input type="text" id="eat_url" placeholder="EAT URL dale">
        <button class="action-btn half-btn" onclick="callAPI('/api/eat_to_token', {eat: getVal('eat_url')}, 'Token Extracted!')">Extract Token</button>
    </div>

    <div class="console-container">
        <div class="console-header">
            <span>🖥️ Live Result / Terminal</span>
            <button class="clear-btn" onclick="clearConsole()">🗑️ Clear</button>
        </div>
        <div class="console" id="console">Result yaha show hoga...</div>
    </div>
</div>

<script>
    // Theme Toggle Logic
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById("themeToggleBtn");
        body.classList.toggle("light-mode");
        
        if(body.classList.contains("light-mode")) {
            btn.innerHTML = "🌙 Night Mode";
        } else {
            btn.innerHTML = "🌞 Light Mode";
        }
    }

    // Console Clear Logic
    function clearConsole() {
        document.getElementById("console").innerText = "Result yaha show hoga...";
    }

    function showTab(tabId) {
        document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }
    
    function getVal(id) { return document.getElementById(id).value; }
    
    function logOutput(msg) { 
        document.getElementById("console").innerText = msg + "\n\n" + document.getElementById("console").innerText; 
    }

    async function callAPI(endpoint, extraData = {}, successMessage = null) {
        const token = getVal('global_token');
        if(!token && endpoint !== '/api/eat_to_token') { 
            alert("❌ ERROR: Sabse pahle upar Access Token dale!"); 
            return null; 
        }
        
        logOutput(`[Processing] ${endpoint} ...`);
        try {
            const response = await fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token: token, ...extraData }) });
            const data = await response.json();
            logOutput(JSON.stringify(data, null, 2));

            if(data.result === 0) {
                if(successMessage) alert("✅ SUCCESS: " + successMessage);
                return data;
            } else if (data.result !== undefined) {
                let err = data.error || "Unknown Error";
                alert("❌ FAILED: " + err + " (Code: " + data.result + ")");
                return null;
            }
            return data;
        } catch (error) { 
            alert("❌ ERROR: " + error.message);
            return null; 
        }
    }

    async function smartBind() {
        const e = getVal('bind_email'), o = getVal('bind_otp'), s = getVal('bind_sec');
        if(!e || !o || !s) return alert("❌ ERROR: Email, OTP aur Security Code tino dale!");
        
        const v = await callAPI('/api/verify_otp', {email: e, otp: o});
        if(v && v.verifier_token) {
            const b = await callAPI('/api/bind_email', {email: e, v_token: v.verifier_token, sec_code: s});
            if(b && b.result === 0) alert("✅ BIND SUCCESSFULLY!");
        } else {
            alert("❌ OTP Verification Failed!");
        }
    }

    async function smartChange() {
        const oldE = getVal('c_old_email'), oldO = getVal('c_old_otp'), secC = getVal('c_sec_code');
        const newE = getVal('c_new_email'), newO = getVal('c_new_otp');

        if(!oldE || !newE || !newO) return alert("❌ ERROR: Old Email, New Email aur New OTP jaruri hai!");
        if(!oldO && !secC) return alert("❌ ERROR: Old OTP ya Security Code dale!");

        const id_res = await callAPI('/api/verify_identity', { email: oldE, otp: oldO, sec_code: secC });
        if(!id_res || !id_res.identity_token) return alert("❌ Identity Verification Failed! (Wrong Security Code or OTP)");
        
        const v_res = await callAPI('/api/verify_otp', { email: newE, otp: newO });
        if(!v_res || !v_res.verifier_token) return alert("❌ New OTP Verification Failed!");

        const c_res = await callAPI('/api/change_email', { id_token: id_res.identity_token, new_email: newE, v_token: v_res.verifier_token });
        if(c_res && c_res.result === 0) alert("✅ EMAIL CHANGED SUCCESSFULLY!");
    }

    async function smartUnbind() {
        const e = getVal('unbind_email'), o = getVal('unbind_otp'), s = getVal('unbind_sec');
        if(!e) return alert("❌ ERROR: Email dale!");
        if(!o && !s) return alert("❌ ERROR: OTP ya Security Code dale!");
        
        const id = await callAPI('/api/verify_identity', {email: e, otp: o, sec_code: s});
        if(id && id.identity_token) {
            const u = await callAPI('/api/unbind_email', {id_token: id.identity_token});
            if(u && u.result === 0) alert("✅ UNBINDED SUCCESSFULLY!");
        } else {
            alert("❌ Identity Verification Failed! (Wrong Security Code or OTP)");
        }
    }
</script>
</body>
  </html>
